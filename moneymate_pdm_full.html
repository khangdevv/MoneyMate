
<div id="pdm"></div>
<style>
#pdm svg.erDiagram .divider path { stroke-opacity: 0.5; }
#pdm svg.erDiagram .row-rect-odd path,
#pdm svg.erDiagram .row-rect-odd rect,
#pdm svg.erDiagram .row-rect-even path,
#pdm svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#1a2a3a' : '#E6F1FB',
    primaryBorderColor: dark ? '#378ADD' : '#185FA5',
    primaryTextColor: dark ? '#c2c0b6' : '#0C447C',
    secondaryColor: dark ? '#1a3a2a' : '#E1F5EE',
    tertiaryColor: dark ? '#2a1a3a' : '#EEEDFE',
  },
});

const { svg } = await mermaid.render('pdm-svg', `erDiagram
  FIREBASE_AUTH {
    string uid PK "Auto sinh boi Firebase"
    string email "Email dang nhap"
    string passwordHash "Firebase tu ma hoa, dev KHONG doc duoc"
    string displayName "Ten hien thi"
    string photoURL "URL anh dai dien"
    timestamp createdAt "Ngay tao tai khoan"
    timestamp lastSignIn "Lan dang nhap cuoi"
  }

  USERS {
    string uid PK "= Firebase Auth UID"
    string displayName "Ten hien thi"
    string email "Email hien thi"
    string photoUrl "URL anh dai dien"
    string currency "Don vi tien te, mac dinh VND"
    timestamp createdAt "Ngay tao"
  }

  CATEGORIES {
    string catId PK "Auto ID Firestore"
    string userId FK "Lien ket USERS"
    string name "Ten danh muc"
    string emoji "Bieu tuong"
    string color "Ma mau hex"
    string type "expense hoac income"
    boolean isDefault "Mac dinh hay tu tao"
    timestamp createdAt "Ngay tao"
  }

  TRANSACTIONS {
    string txId PK "Auto ID Firestore"
    string userId FK "Lien ket USERS"
    string catId FK "Lien ket CATEGORIES"
    string type "expense hoac income"
    number amount "So tien VND"
    string note "Ghi chu tuy chon"
    boolean hasReceipt "Co anh dinh kem"
    timestamp date "Ngay thuc hien"
    timestamp createdAt "Ngay tao ban ghi"
  }

  RECEIPT_IMAGES {
    string imageId PK "Auto ID Firestore"
    string txId FK "Lien ket TRANSACTIONS"
    string storagePath "Duong dan Firebase Storage"
    string downloadUrl "URL truy cap anh"
    string label "Ghi chu anh"
    timestamp uploadedAt "Ngay upload"
  }

  BUDGETS {
    string budgetId PK "Format: yyyy_MM"
    string userId FK "Lien ket USERS"
    number year "Nam"
    number month "Thang 1-12"
    number limitAmount "Han muc chi tieu VND"
    timestamp updatedAt "Cap nhat lan cuoi"
  }

  FIREBASE_AUTH ||--|| USERS : "tao profile khi dang ky"
  USERS ||--o{ CATEGORIES : "so huu"
  USERS ||--o{ TRANSACTIONS : "so huu"
  USERS ||--o{ BUDGETS : "thiet lap"
  CATEGORIES ||--o{ TRANSACTIONS : "phan loai"
  TRANSACTIONS ||--o{ RECEIPT_IMAGES : "dinh kem"
`);

document.getElementById('pdm').innerHTML = svg;

document.querySelectorAll('#pdm svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill','stroke','stroke-width','class','style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#pdm svg .row-rect-odd path, #pdm svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
